<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORM-MAN — The Underground Avenger</title>

  <!-- React 18 + Babel (no build step needed) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --bg:        #080603;
      --bg-alt:    #0f0b07;
      --bg-card:   #130e08;
      --accent:    #a8e063;
      --gold:      #d4a84b;
      --red:       #c0392b;
      --purple:    #6d4c41;
      --text:      #e8e0d0;
      --muted:     #7a6a55;
      --border:    rgba(168,224,99,0.18);
      --glow:      0 0 24px rgba(168,224,99,0.45);
      --glow-gold: 0 0 24px rgba(212,168,75,0.5);
      --nav-h:     60px;
      --radius:    4px;
      --trans:     all 0.3s ease;
    }
    [data-theme="light"] {
      --bg:      #f5f0e8;
      --bg-alt:  #ede5d6;
      --bg-card: #ffffff;
      --text:    #1a1208;
      --muted:   #6b5840;
      --border:  rgba(100,150,30,0.25);
      --glow:    0 0 20px rgba(100,180,40,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.65;
      overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; transition: var(--trans); }
    a:hover { opacity: 0.8; }
    em { font-style: italic; color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      display: inline-block; padding: 14px 32px; border-radius: var(--radius);
      font-weight: 800; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; border: 2px solid transparent; transition: var(--trans); text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow); }
    .btn-primary:hover { background: transparent; color: var(--accent); box-shadow: var(--glow),0 0 40px rgba(168,224,99,.3); transform: translateY(-2px); opacity:1; }
    .btn-outline  { background: transparent; color: var(--gold); border-color: var(--gold); box-shadow: var(--glow-gold); }
    .btn-outline:hover { background: var(--gold); color: #000; transform: translateY(-2px); opacity:1; }

    /* ── Section titles ── */
    .section-title {
      font-size: clamp(1.8rem,4vw,3rem); font-weight:900; text-transform:uppercase;
      letter-spacing:4px; text-align:center; color:var(--text); padding-top:80px;
    }
    .section-title::after {
      content:''; display:block; width:60px; height:4px;
      background:linear-gradient(90deg,var(--accent),var(--gold));
      margin:12px auto 0; box-shadow:var(--glow);
    }
    .section-sub { text-align:center; color:var(--muted); margin:12px 0 48px; font-size:1rem; letter-spacing:1px; }

    /* ── Alert bar ── */
    .alert-bar {
      background:var(--red); color:#fff; font-weight:700; font-size:0.78rem;
      letter-spacing:1px; text-transform:uppercase; padding:9px 0;
      overflow:hidden; white-space:nowrap; position:relative; z-index:200;
    }
    .marquee-text { display:inline-block; animation:marquee 26s linear infinite; }
    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    /* ── Back to top ── */
    .back-to-top {
      position:fixed; bottom:28px; right:28px; z-index:500;
      width:46px; height:46px; background:var(--accent); color:#000;
      border:none; border-radius:50%; font-size:1.4rem; font-weight:900;
      cursor:pointer; opacity:0; transform:translateY(20px);
      transition:var(--trans); box-shadow:var(--glow);
    }
    .back-to-top.visible { opacity:1; transform:translateY(0); }
    .back-to-top:hover   { background:var(--gold); box-shadow:var(--glow-gold); }

    /* ── Navbar ── */
    .navbar {
      position:sticky; top:0; z-index:100; height:var(--nav-h);
      background:rgba(8,6,3,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .nav-inner {
      max-width:1200px; margin:0 auto; height:100%;
      display:flex; align-items:center; gap:32px; padding:0 24px;
    }
    .logo {
      font-size:1.25rem; font-weight:900; letter-spacing:3px; text-transform:uppercase;
      color:var(--accent); text-shadow:var(--glow); cursor:default; flex-shrink:0;
      animation:glitch-idle 7s infinite;
    }
    @keyframes glitch-idle {
      0%,88%,100%{text-shadow:var(--glow);transform:none}
      89%{text-shadow:3px 0 var(--red),-3px 0 var(--accent);transform:skew(-1deg)}
      91%{text-shadow:-3px 0 var(--purple),3px 0 var(--gold);transform:skew(1deg)}
      93%{text-shadow:var(--glow);transform:none}
    }
    .nav-links { list-style:none; display:flex; gap:6px; margin-left:auto; }
    .nav-links a {
      color:var(--text); font-size:0.82rem; font-weight:700; letter-spacing:1.5px;
      text-transform:uppercase; padding:6px 14px; border-radius:var(--radius);
      transition:var(--trans); border:1px solid transparent;
    }
    .nav-links a:hover,.nav-links a.active {
      color:var(--accent); border-color:var(--border);
      background:rgba(168,224,99,.07); text-decoration:none; box-shadow:var(--glow);
    }
    .theme-toggle {
      background:none; border:1px solid var(--border); color:var(--gold);
      font-size:1rem; padding:6px 10px; border-radius:var(--radius);
      cursor:pointer; transition:var(--trans); flex-shrink:0;
    }
    .theme-toggle:hover { background:rgba(212,168,75,.1); }
    .hamburger { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:6px; flex-shrink:0; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--accent); transition:var(--trans); transform-origin:center; }
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    /* ── Hero ── */
    .hero {
      position:relative; min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; text-align:center; overflow:hidden;
      background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(168,224,99,.06) 0%,transparent 70%),
                 radial-gradient(ellipse 50% 50% at 80% 80%,rgba(212,168,75,.04) 0%,transparent 60%),var(--bg);
      padding:100px 24px 60px;
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(-55deg,transparent 0px,transparent 58px,rgba(168,224,99,.02) 58px,rgba(168,224,99,.02) 59px);
      pointer-events:none;
    }
    #particles-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
    .hero-content { position:relative; z-index:2; max-width:900px; }
    .hero-badge {
      display:inline-block; background:var(--red); color:#fff; font-size:0.7rem;
      font-weight:800; letter-spacing:3px; text-transform:uppercase;
      padding:6px 18px; margin-bottom:24px; animation:badge-pulse 2.5s ease-in-out infinite;
    }
    @keyframes badge-pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.6)}50%{box-shadow:0 0 0 12px rgba(192,57,43,0)}}
    .hero-title {
      font-size:clamp(5rem,18vw,13rem); font-weight:900; line-height:.88;
      letter-spacing:-3px; text-transform:uppercase; color:#fff;
      text-shadow:5px 5px 0 rgba(168,224,99,.4),0 0 60px rgba(168,224,99,.2);
      animation:title-enter 0.8s cubic-bezier(.22,1,.36,1) both; margin-bottom:20px;
    }
    .hero-title .highlight {
      color:var(--accent); display:block;
      text-shadow:5px 5px 0 rgba(0,0,0,.6),0 0 80px rgba(168,224,99,.7);
      animation:neon-throb 3s ease-in-out infinite;
    }
    @keyframes title-enter{from{opacity:0;transform:scale(.7) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes neon-throb{
      0%,100%{text-shadow:5px 5px 0 rgba(0,0,0,.6),0 0 80px rgba(168,224,99,.7)}
      50%{text-shadow:5px 5px 0 rgba(0,0,0,.6),0 0 120px rgba(168,224,99,1),0 0 180px rgba(168,224,99,.5)}
    }
    .hero-tagline {
      font-size:1.25rem; font-weight:700; letter-spacing:3px; text-transform:uppercase;
      color:var(--gold); min-height:40px; margin-bottom:16px; text-shadow:var(--glow-gold);
    }
    .cursor {
      display:inline-block; width:3px; height:1.2em; background:var(--gold);
      vertical-align:middle; margin-left:3px; animation:blink .9s step-end infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .hero-sub { max-width:560px; margin:0 auto 36px; color:rgba(232,224,208,.72); font-size:1.05rem; line-height:1.8; }
    .hero-btns { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
    .hero-stats {
      position:relative; z-index:2; display:flex; gap:56px; flex-wrap:wrap;
      justify-content:center; margin-top:60px; padding:28px 48px;
      border:1px solid var(--border); background:rgba(0,0,0,.55); backdrop-filter:blur(8px);
    }
    .hero-stat { text-align:center; }
    .hero-stat span { font-size:2.4rem; font-weight:900; color:var(--accent); text-shadow:var(--glow); }
    .hero-stat p { font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:4px; }

    /* ── Origin ── */
    #origin { padding-bottom:80px; }
    .origin-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:2px; max-width:1100px; margin:0 auto; padding:0 24px;
    }
    .origin-panel {
      background:var(--bg-card); border:2px solid var(--border);
      padding:36px 28px 32px; position:relative; transition:var(--trans); overflow:hidden;
    }
    .origin-panel::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(168,224,99,.04),transparent 60%); pointer-events:none;
    }
    .origin-panel:hover { border-color:var(--accent); box-shadow:var(--glow); transform:translateY(-4px); }
    .panel-number { position:absolute; top:0; left:0; background:var(--accent); color:#000; font-weight:900; font-size:.7rem; letter-spacing:2px; padding:4px 10px; }
    .panel-icon { font-size:2.4rem; margin:12px 0 16px; }
    .origin-panel h3 { font-size:.95rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
    .origin-panel p { font-size:.9rem; color:rgba(232,224,208,.72); line-height:1.75; }

    /* ── Powers ── */
    #powers { padding-bottom:80px; background:var(--bg-alt); }
    .powers-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; max-width:1100px; margin:0 auto; padding:0 24px; }
    .power-card {
      background:var(--bg-card); border:1px solid var(--border); padding:32px 24px 28px;
      border-radius:var(--radius); position:relative; cursor:pointer;
      transition:box-shadow .3s ease,border-color .3s ease;
      transform-style:preserve-3d; overflow:hidden; will-change:transform;
    }
    .power-card:hover { border-color:var(--accent); box-shadow:var(--glow); }
    .power-card.activated { border-color:var(--gold); box-shadow:var(--glow-gold),inset 0 0 40px rgba(212,168,75,.05); animation:card-activate .4s ease; }
    @keyframes card-activate{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
    .power-glow { position:absolute; inset:0; background:radial-gradient(circle at 50% 0%,rgba(168,224,99,.07),transparent 70%); pointer-events:none; opacity:0; transition:opacity .3s; }
    .power-card:hover .power-glow { opacity:1; }
    .power-icon { font-size:2.6rem; margin-bottom:16px; display:block; transition:transform .3s ease; }
    .power-card:hover .power-icon { transform:scale(1.15) rotate(-5deg); }
    .power-card h3 { font-size:.95rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
    .power-card p { font-size:.87rem; color:rgba(232,224,208,.7); line-height:1.72; margin-bottom:20px; }
    .power-level span { font-size:.64rem; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
    .power-bar { height:5px; background:rgba(255,255,255,.08); border-radius:3px; margin-top:6px; overflow:hidden; }
    .power-fill { height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:3px; transition:width 1.4s cubic-bezier(.25,1,.5,1); box-shadow:0 0 6px rgba(168,224,99,.6); }
    .power-fill.threat { background:linear-gradient(90deg,var(--red),#e07060); box-shadow:0 0 6px rgba(192,57,43,.6); }

    /* ── Stats Banner ── */
    .stats-banner {
      display:flex; flex-wrap:wrap; justify-content:center;
      background:linear-gradient(135deg,#000 0%,#0a0e06 50%,#000 100%);
      border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:48px 24px;
    }
    .stat-item { flex:1; min-width:160px; text-align:center; padding:16px 32px; border-right:1px solid var(--border); }
    .stat-item:last-child { border-right:none; }
    .stat-item h2 { font-size:3rem; font-weight:900; color:var(--accent); text-shadow:var(--glow); letter-spacing:-1px; }
    .stat-item p { font-size:.68rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-top:6px; }

    /* ── Enemies ── */
    #enemies { padding-bottom:80px; }
    .enemies-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; max-width:1100px; margin:0 auto; padding:0 24px; }
    .enemy-card { background:var(--bg-card); border:1px solid rgba(192,57,43,.15); padding:32px 24px 28px; border-radius:var(--radius); position:relative; transition:var(--trans); }
    .enemy-card:hover { border-color:var(--red); box-shadow:0 0 24px rgba(192,57,43,.35); transform:translateY(-4px); }
    .enemy-badge { display:inline-block; background:var(--red); color:#fff; font-size:.62rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; margin-bottom:16px; }
    .enemy-badge.arch { background:linear-gradient(90deg,#c0392b,#7b1a12); animation:danger-flash 2.2s ease-in-out infinite; }
    @keyframes danger-flash{0%,100%{box-shadow:0 0 14px rgba(192,57,43,.5)}50%{box-shadow:0 0 30px rgba(192,57,43,1),0 0 55px rgba(192,57,43,.4)}}
    .enemy-icon { font-size:2.6rem; margin-bottom:14px; display:block; }
    .enemy-card h3 { font-size:.95rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--red); margin-bottom:10px; }
    .enemy-card p { font-size:.87rem; color:rgba(232,224,208,.7); line-height:1.72; margin-bottom:20px; }
    .threat-row span { font-size:.64rem; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

    /* ── Comics ── */
    #comics { padding-bottom:80px; background:var(--bg-alt); }
    .comics-grid { display:grid; grid-template-columns:1.6fr 1fr 1fr; gap:20px; max-width:1100px; margin:0 auto; padding:0 24px; }
    .comic-card { background:var(--bg-card); border:1px solid var(--border); padding:32px 24px; border-radius:var(--radius); position:relative; transition:var(--trans); display:flex; flex-direction:column; }
    .comic-card:hover { border-color:var(--accent); box-shadow:var(--glow); transform:translateY(-4px); }
    .comic-card.featured { border-color:var(--gold); box-shadow:var(--glow-gold); background:linear-gradient(135deg,#130e08,#0d0905); }
    .comic-card.featured:hover { box-shadow:var(--glow-gold),0 0 60px rgba(212,168,75,.2); }
    .comic-issue { font-size:.68rem; font-weight:900; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
    .comic-icon { font-size:2.4rem; margin-bottom:16px; }
    .comic-card h3 { font-size:1.05rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--text); margin-bottom:12px; }
    .comic-card.featured h3 { color:var(--gold); }
    .comic-card p { font-size:.87rem; color:rgba(232,224,208,.65); line-height:1.72; flex-grow:1; font-style:italic; margin-bottom:20px; }
    .comic-tag { font-size:.62rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; padding:5px 12px; align-self:flex-start; background:var(--accent); color:#000; }
    .comic-card:not(.featured) .comic-tag { background:transparent; color:var(--muted); border:1px solid var(--border); }

    /* ── Join ── */
    .join-section {
      background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(168,224,99,.05),transparent 70%),var(--bg);
      border-top:1px solid var(--border); text-align:center; padding:80px 24px;
    }
    .join-section h2 { font-size:clamp(1.8rem,4vw,2.8rem); font-weight:900; letter-spacing:4px; text-transform:uppercase; color:var(--accent); text-shadow:var(--glow); margin-bottom:12px; }
    .join-section > p { color:var(--muted); max-width:500px; margin:0 auto 40px; }
    .newsletter-form { display:flex; flex-direction:column; gap:16px; max-width:420px; margin:0 auto; }
    .form-group { position:relative; }
    .newsletter-form input { width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text); padding:14px 18px; border-radius:var(--radius); font-size:.95rem; outline:none; transition:var(--trans); }
    .newsletter-form input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(168,224,99,.12); }
    .newsletter-form input.error { border-color:var(--red); }
    .input-error { display:block; color:var(--red); font-size:.76rem; margin-top:5px; min-height:18px; text-align:left; padding-left:4px; }
    .subscribe-btn { width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:var(--radius); font-size:.88rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:var(--trans); box-shadow:var(--glow); }
    .subscribe-btn:hover { background:var(--gold); box-shadow:var(--glow-gold); transform:translateY(-2px); }
    .form-success { color:var(--accent); font-weight:700; font-size:1.05rem; letter-spacing:1px; margin-top:20px; }
    .hidden { display:none !important; }

    /* ── Footer ── */
    footer { background:#000; border-top:1px solid var(--border); padding-top:60px; }
    .footer-inner { max-width:1100px; margin:0 auto; padding:0 24px 48px; display:grid; grid-template-columns:2fr 1fr 1fr; gap:48px; }
    .footer-brand .logo { font-size:1.3rem; margin-bottom:12px; color:var(--accent); cursor:default; animation:none; }
    .footer-brand p { font-size:.87rem; color:var(--muted); line-height:1.7; }
    .footer-links-group h5 { font-size:.68rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
    .footer-links-group a { display:block; color:var(--muted); font-size:.87rem; margin-bottom:10px; }
    .footer-links-group a:hover { color:var(--accent); text-decoration:none; opacity:1; }
    .footer-bottom { border-top:1px solid var(--border); padding:20px 24px; max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; font-size:.8rem; color:var(--muted); }
    .footer-bottom a { color:var(--muted); }
    .footer-bottom a:hover { color:var(--accent); }

    /* ── Click Burst ── */
    .click-burst {
      position:fixed; pointer-events:none; font-size:1.4rem; font-weight:900; color:var(--gold);
      text-shadow:0 0 12px var(--gold),2px 2px 0 #000; transform:translate(-50%,-50%);
      animation:burst-pop .85s ease forwards; z-index:9999; white-space:nowrap;
      letter-spacing:2px; font-style:italic; font-family:impact,'Arial Black',sans-serif;
    }
    @keyframes burst-pop{
      0%{transform:translate(-50%,-50%) scale(.4) rotate(-12deg);opacity:1}
      45%{transform:translate(-50%,-80%) scale(1.4) rotate(6deg);opacity:1}
      100%{transform:translate(-50%,-130%) scale(1) rotate(-4deg);opacity:0}
    }

    /* ── Scroll Reveal ── */
    @keyframes card-enter { from{opacity:0;transform:translateY(30px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    /* ── Responsive ── */
    @media(max-width:900px){
      .comics-grid{grid-template-columns:1fr}
      .footer-inner{grid-template-columns:1fr 1fr}
      .footer-brand{grid-column:1/-1}
    }
    @media(max-width:700px){
      .hamburger{display:flex}
      .nav-links{
        display:none; position:absolute; top:var(--nav-h); left:0; right:0;
        flex-direction:column; background:rgba(8,6,3,.97);
        border-bottom:1px solid var(--border); padding:16px; gap:4px; backdrop-filter:blur(12px);
      }
      .nav-links.open{display:flex}
      .hero-title{letter-spacing:-1px}
      .hero-stats{gap:24px;padding:20px 24px}
      .origin-grid{grid-template-columns:1fr;gap:2px}
      .enemies-grid{grid-template-columns:1fr}
      .stat-item{border-right:none;border-bottom:1px solid var(--border);padding:20px}
      .stat-item:last-child{border-bottom:none}
      .footer-inner{grid-template-columns:1fr;gap:28px}
      .footer-bottom{flex-direction:column;text-align:center}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Hooks ───────────────────────────────────────── */

    function useTypewriter(phrases, startDelay = 1000) {
      const [display, setDisplay] = useState('');
      const state = useRef({ phraseIdx: 0, charIdx: 0, deleting: false });

      useEffect(() => {
        let timer;
        function step() {
          const s = state.current;
          const current = phrases[s.phraseIdx];
          if (!s.deleting) {
            s.charIdx++;
            setDisplay(current.slice(0, s.charIdx));
            if (s.charIdx === current.length) { s.deleting = true; timer = setTimeout(step, 2400); return; }
            timer = setTimeout(step, 60);
          } else {
            s.charIdx--;
            setDisplay(current.slice(0, s.charIdx));
            if (s.charIdx === 0) {
              s.deleting = false;
              s.phraseIdx = (s.phraseIdx + 1) % phrases.length;
              timer = setTimeout(step, 350); return;
            }
            timer = setTimeout(step, 28);
          }
        }
        timer = setTimeout(step, startDelay);
        return () => clearTimeout(timer);
      }, []);

      return display;
    }

    function useCounter(target, duration = 1800) {
      const [value, setValue] = useState(0);
      const elRef = useRef(null);
      const animated = useRef(false);

      useEffect(() => {
        const el = elRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting && !animated.current) {
            animated.current = true;
            const start = performance.now();
            function tick(now) {
              const p = Math.min((now - start) / duration, 1);
              setValue(Math.floor((1 - Math.pow(1 - p, 3)) * target));
              if (p < 1) requestAnimationFrame(tick);
              else setValue(target);
            }
            requestAnimationFrame(tick);
          }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [target, duration]);

      return { value, elRef };
    }

    function useBarReveal(level) {
      const barRef = useRef(null);
      useEffect(() => {
        const el = barRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting) { el.style.width = level + '%'; obs.disconnect(); }
        }, { threshold: 0.3 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [level]);
      return barRef;
    }

    function useScrollReveal(selector) {
      useEffect(() => {
        const els = document.querySelectorAll(selector);
        els.forEach((el, i) => { el.style.opacity = '0'; el.style.animationDelay = `${i * 0.06}s`; });
        const obs = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.style.animation = 'card-enter 0.5s ease forwards'; obs.unobserve(entry.target); }
          });
        }, { threshold: 0.1 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, [selector]);
    }

    /* ── Particle Canvas ─────────────────────────────── */
    const COLORS = ['#a8e063','#d4a84b','#ffffff','#a8e063','#c8f080'];

    function ParticleCanvas() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let particles = [], raf;

        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }

        function spawn() {
          return {
            x: Math.random() * canvas.width,
            y: canvas.height * (0.2 + Math.random() * 0.8),
            r: Math.random() * 2 + 0.8,
            vx: (Math.random() - 0.5) * 2.5,
            vy: -(Math.random() * 2.8 + 1),
            life: 1,
            decay: Math.random() * 0.008 + 0.004,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            tail: Math.random() * 7 + 3,
          };
        }

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (Math.random() < 0.4) particles.push(spawn());
          particles = particles.filter(p => p.life > 0);
          for (const p of particles) {
            ctx.globalAlpha = p.life * 0.85;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x - p.vx * p.tail, p.y - p.vy * p.tail);
            ctx.strokeStyle = p.color; ctx.lineWidth = p.r;
            ctx.shadowColor = p.color; ctx.shadowBlur = 10;
            ctx.stroke();
            p.x += p.vx; p.y += p.vy; p.life -= p.decay;
          }
          ctx.globalAlpha = 1; ctx.shadowBlur = 0;
          raf = requestAnimationFrame(draw);
        }

        resize();
        window.addEventListener('resize', resize);
        raf = requestAnimationFrame(draw);
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, []);

      return <canvas id="particles-canvas" ref={canvasRef} />;
    }

    /* ── AlertBar ────────────────────────────────────── */
    function AlertBar() {
      const msg = '⚡ BREAKING: Worm-Man defeats The Exterminator — Soilville saved AGAIN \u00A0\u00A0⚡\u00A0\u00A0 The Mole King arrested — Worm-Man burrows twice in one night \u00A0\u00A0⚡\u00A0\u00A0 BREAKING: Worm-Man defeats The Exterminator — Soilville saved AGAIN \u00A0\u00A0⚡\u00A0\u00A0 The Mole King arrested — Worm-Man burrows twice in one night \u00A0\u00A0';
      return <div className="alert-bar"><span className="marquee-text">{msg}</span></div>;
    }

    /* ── Navbar ──────────────────────────────────────── */
    const NAV_LINKS = [
      {href:'#origin',label:'Origin'},{href:'#powers',label:'Powers'},
      {href:'#enemies',label:'Enemies'},{href:'#comics',label:'Comics'},{href:'#join',label:'Join'},
    ];

    function Navbar() {
      const [theme, setTheme] = useState(() => localStorage.getItem('wm-theme') || 'dark');
      const [menuOpen, setMenuOpen] = useState(false);
      const [activeId, setActiveId] = useState('');

      useEffect(() => { document.documentElement.dataset.theme = theme; }, [theme]);

      useEffect(() => {
        const sections = document.querySelectorAll('section[id]');
        const obs = new IntersectionObserver(
          entries => entries.forEach(e => { if (e.isIntersecting) setActiveId(e.target.id); }),
          { rootMargin: '-40% 0px -55% 0px' }
        );
        sections.forEach(s => obs.observe(s));
        return () => obs.disconnect();
      }, []);

      function toggleTheme() {
        const next = theme === 'dark' ? 'light' : 'dark';
        setTheme(next); localStorage.setItem('wm-theme', next);
      }

      return (
        <nav className="navbar">
          <div className="nav-inner">
            <div className="logo">🪱 WORM-MAN</div>
            <ul className={`nav-links${menuOpen ? ' open' : ''}`}>
              {NAV_LINKS.map(({href, label}) => (
                <li key={href}>
                  <a href={href} className={activeId === href.slice(1) ? 'active' : ''}
                     onClick={() => setMenuOpen(false)}>{label}</a>
                </li>
              ))}
            </ul>
            <button className="theme-toggle" onClick={toggleTheme} title="Toggle theme">
              {theme === 'dark' ? '☀️' : '🌙'}
            </button>
            <button className={`hamburger${menuOpen ? ' open' : ''}`}
                    onClick={() => setMenuOpen(o => !o)} aria-label="Toggle menu">
              <span/><span/><span/>
            </button>
          </div>
        </nav>
      );
    }

    /* ── Hero ────────────────────────────────────────── */
    const PHRASES = [
      'The Underground Avenger',
      'Faster. Deeper. Unstoppable.',
      "He Didn't Die. He Tunnelled Back.",
      'One Inch Changed Everything.',
    ];

    function StatCounter({target, suffix=''}) {
      const {value, elRef} = useCounter(target);
      return <span ref={elRef}>{value.toLocaleString()}{suffix}</span>;
    }

    function Hero() {
      const tagline = useTypewriter(PHRASES);
      return (
        <section className="hero">
          <ParticleCanvas />
          <div className="hero-content">
            <div className="hero-badge">⚡ MARVEL'S MOST TENACIOUS HERO ⚡</div>
            <h1 className="hero-title">WORM<span className="highlight">MAN</span></h1>
            <p className="hero-tagline">{tagline}<span className="cursor" /></p>
            <p className="hero-sub">
              Part human. Part annelid. All legend. When Dr.&nbsp;Ellis Voss was swallowed whole
              by a genetically-altered Giant Gippsland Earthworm, he didn't dissolve &mdash; he <em>transformed.</em>
            </p>
            <div className="hero-btns">
              <a href="#origin" className="btn btn-primary">His Origin</a>
              <a href="#powers" className="btn btn-outline">His Powers</a>
            </div>
          </div>
          <div className="hero-stats">
            <div className="hero-stat"><StatCounter target={847} />+<p>Villains Defeated</p></div>
            <div className="hero-stat"><StatCounter target={12} /><p>Cities Protected</p></div>
            <div className="hero-stat"><StatCounter target={100} suffix="%" /><p>Invincible</p></div>
          </div>
        </section>
      );
    }

    /* ── Origin ──────────────────────────────────────── */
    const PANELS = [
      {num:'01',icon:'🔬',title:'The Scientist',text:"Dr. Ellis Voss was Soilville's foremost soil biologist — obsessed with unlocking the regenerative secrets of earthworm biology to heal damaged ecosystems."},
      {num:'02',icon:'⚗️',title:'The Experiment',text:'A classified government lab. A genetically-modified Giant Gippsland Earthworm. One moment of containment failure. The tunnelling chamber breached at 3:12 AM.'},
      {num:'03',icon:'🫀',title:'The Transformation',text:"Instead of being crushed, the worm's enzymatic secretions rewrote his cellular structure from the outside in. He spent 21 days cocooned in soil, regenerating."},
      {num:'04',icon:'🪱',title:'The Birth',text:'Worm-Man emerged. His limbs can elongate and burrow through solid earth. He regenerates severed tissue in seconds. He is flexible, relentless, and impossible to stop.'},
    ];

    function Origin() {
      return (
        <section id="origin">
          <h2 className="section-title">The Origin</h2>
          <p className="section-sub">One worm. One man. One legend.</p>
          <div className="origin-grid">
            {PANELS.map(p => (
              <div className="origin-panel" key={p.num}>
                <div className="panel-number">{p.num}</div>
                <div className="panel-icon">{p.icon}</div>
                <h3>{p.title}</h3>
                <p>{p.text}</p>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ── Powers ──────────────────────────────────────── */
    const POWERS = [
      {icon:'💪',title:'Annelid Strength',desc:'His worm-arms generate 12 tonnes of lateral compression. No wall, no vault, no enemy can withstand his burrowing grip.',level:95},
      {icon:'🧬',title:'Regenerative Slime',desc:'Secretes a bio-enzyme coating on command. One touch dissolves armour and neutralises even the toughest villain.',level:90},
      {icon:'🛡️',title:'Peristaltic Armour',desc:'Muscular body-wall rings contract to form living armour. He absorbs direct impacts from heavy weaponry without flinching.',level:88},
      {icon:'📡',title:'Seismic Sense',desc:"Detects vibrations and soil disturbances within a 600 m radius. He feels the villain's footsteps before they even form a plan.",level:97},
      {icon:'🔄',title:'Segment Rebirth',desc:'Severed segments regenerate into full limbs within minutes. Invincibility is not an exaggeration — it is a biological fact.',level:100},
      {icon:'🌑',title:'Darkness Sight',desc:'Eyes adapted for total subterranean darkness emit a hypnotic bio-light. One glance underground and enemies freeze in disorientation.',level:82},
    ];

    function PowerCard({power}) {
      const [activated, setActivated] = useState(false);
      const barRef = useBarReveal(power.level);

      function handleMouseMove(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const rotX = ((e.clientY - rect.top - rect.height/2) / (rect.height/2)) * -12;
        const rotY = ((e.clientX - rect.left - rect.width/2) / (rect.width/2)) * 12;
        e.currentTarget.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.03)`;
      }

      return (
        <div className={`power-card${activated ? ' activated' : ''}`}
             onClick={() => setActivated(a => !a)}
             onMouseMove={handleMouseMove}
             onMouseLeave={e => { e.currentTarget.style.transform = ''; }}>
          <div className="power-glow" />
          <span className="power-icon">{power.icon}</span>
          <h3>{power.title}</h3>
          <p>{power.desc}</p>
          <div className="power-level">
            <span>POWER LEVEL</span>
            <div className="power-bar"><div className="power-fill" ref={barRef} /></div>
          </div>
        </div>
      );
    }

    function Powers() {
      return (
        <section id="powers">
          <h2 className="section-title">Worm Powers</h2>
          <p className="section-sub">Click a card to activate</p>
          <div className="powers-grid">
            {POWERS.map(p => <PowerCard key={p.title} power={p} />)}
          </div>
        </section>
      );
    }

    /* ── Stats Banner ────────────────────────────────── */
    function Stat({target, suffix='', label}) {
      const {value, elRef} = useCounter(target);
      return (
        <div className="stat-item">
          <h2><span ref={elRef}>{value.toLocaleString()}</span>{suffix}</h2>
          <p>{label}</p>
        </div>
      );
    }

    function StatsBanner() {
      return (
        <section className="stats-banner">
          <Stat target={847} suffix="+" label="Villains Defeated" />
          <Stat target={12} label="Cities Protected" />
          <Stat target={9} label="Years Active" />
          <Stat target={3} suffix="M" label="Fans Worldwide" />
        </section>
      );
    }

    /* ── Enemies ─────────────────────────────────────── */
    const ENEMIES = [
      {badge:'ARCH ENEMY',arch:true,icon:'🦅',name:'The Robin',desc:"Worm-Man's greatest nemesis. Genetically enhanced with a robin's targeting instincts — the one creature that has hunted Worm-Man since day one.",threat:98},
      {badge:'VILLAIN',icon:'🪤',name:'The Tiller',desc:"Wields a weaponised rotary tiller that disrupts Worm-Man's underground tunnels — collapsing his escape routes and sealing him underground.",threat:75},
      {badge:'VILLAIN',icon:'👑',name:'Mole King',desc:"A crime lord who stole Worm-Man's regeneration enzymes and weaponised them. Now sells bio-serums to the highest bidder behind an army of subterranean henchmen.",threat:80},
      {badge:'VILLAIN',icon:'🧪',name:'Dr. Pesticide',desc:'A fanatical soil-purity zealot who believes Worm-Man is a biological contamination. His precision toxin cocktails make him lethally unpredictable.',threat:71},
    ];

    function EnemyCard({enemy}) {
      const barRef = useBarReveal(enemy.threat);
      return (
        <div className="enemy-card">
          <div className={`enemy-badge${enemy.arch ? ' arch' : ''}`}>{enemy.badge}</div>
          <span className="enemy-icon">{enemy.icon}</span>
          <h3>{enemy.name}</h3>
          <p>{enemy.desc}</p>
          <div className="threat-row">
            <span>THREAT</span>
            <div className="power-bar"><div className="power-fill threat" ref={barRef} /></div>
          </div>
        </div>
      );
    }

    function Enemies() {
      return (
        <section id="enemies">
          <h2 className="section-title">The Rogues Gallery</h2>
          <p className="section-sub">Every legend needs a villain worth fearing</p>
          <div className="enemies-grid">
            {ENEMIES.map(e => <EnemyCard key={e.name} enemy={e} />)}
          </div>
        </section>
      );
    }

    /* ── Comics ──────────────────────────────────────── */
    const COMICS = [
      {issue:'#47',icon:'🪱',title:'DEEP RISING',blurb:'"The Robin has poisoned the Soilville aquifer. The city has 48 hours. Worm-Man has one tunnel left."',tag:'LATEST ISSUE',featured:true},
      {issue:'#46',icon:'🌑',title:'UNDER THE SOIL',blurb:"\"The Tiller's rotary blades reach a depth Worm-Man cannot escape. Can Ellis Voss outrun his own tunnels?\"",tag:'PREVIOUS'},
      {issue:'#45',icon:'🫀',title:'SECOND SKIN',blurb:"\"Worm-Man's regeneration begins to slow. For the first time, a wound does not close. The city doesn't know it yet.\"",tag:'PREVIOUS'},
    ];

    function Comics() {
      return (
        <section id="comics">
          <h2 className="section-title">Latest Issues</h2>
          <p className="section-sub">The Worm-Man Universe — ongoing since 2017</p>
          <div className="comics-grid">
            {COMICS.map(c => (
              <div className={`comic-card${c.featured ? ' featured' : ''}`} key={c.issue}>
                <div className="comic-issue">{c.issue}</div>
                <div className="comic-icon">{c.icon}</div>
                <h3>{c.title}</h3>
                <p>{c.blurb}</p>
                <span className="comic-tag">{c.tag}</span>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ── Join ────────────────────────────────────────── */
    function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function Join() {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [nameErr, setNameErr] = useState('');
      const [emailErr, setEmailErr] = useState('');
      const [submitted, setSubmitted] = useState(false);

      function handleSubmit(e) {
        e.preventDefault();
        let ok = true;
        if (name.trim().length < 2) { setNameErr('Enter your codename (at least 2 characters).'); ok = false; } else setNameErr('');
        if (!isValidEmail(email.trim())) { setEmailErr('Please enter a valid email address.'); ok = false; } else setEmailErr('');
        if (ok) setSubmitted(true);
      }

      return (
        <section id="join" className="join-section">
          <h2>Join the Worm Legion ⚡</h2>
          <p>Mission briefings, exclusive comic previews, and Worm-Man intel — delivered to your inbox every week.</p>
          {!submitted ? (
            <form className="newsletter-form" onSubmit={handleSubmit} noValidate>
              <div className="form-group">
                <input type="text" placeholder="Your codename" value={name}
                       className={nameErr ? 'error' : ''}
                       onChange={e => setName(e.target.value)} autoComplete="off" />
                <span className="input-error">{nameErr}</span>
              </div>
              <div className="form-group">
                <input type="email" placeholder="your@email.com" value={email}
                       className={emailErr ? 'error' : ''}
                       onChange={e => setEmail(e.target.value)} autoComplete="off" />
                <span className="input-error">{emailErr}</span>
              </div>
              <button type="submit" className="subscribe-btn">Enlist Now</button>
            </form>
          ) : (
            <p className="form-success">⚡ Welcome to the Legion, agent. Stay underground.</p>
          )}
        </section>
      );
    }

    /* ── Footer ──────────────────────────────────────── */
    function Footer() {
      return (
        <footer>
          <div className="footer-inner">
            <div className="footer-brand">
              <div className="logo">🪱 WORM-MAN</div>
              <p>Protecting Soilville since 2017. Part man. Part worm. All hero.</p>
            </div>
            <div className="footer-links-group">
              <h5>Universe</h5>
              <a href="#origin">Origin Story</a>
              <a href="#powers">Powers</a>
              <a href="#enemies">Enemies</a>
              <a href="#comics">Comics</a>
            </div>
            <div className="footer-links-group">
              <h5>Community</h5>
              <a href="#">Worm Legion Forum</a>
              <a href="#">Fan Art</a>
              <a href="#">Merchandise</a>
              <a href="#">Contact</a>
            </div>
          </div>
          <div className="footer-bottom">
            <p>© 2026 WORM-MAN — The Underground Avenger. All rights reserved.</p>
            <p><a href="#">Privacy Policy</a> · <a href="#">Terms of Use</a></p>
          </div>
        </footer>
      );
    }

    /* ── Click Burst ─────────────────────────────────── */
    const BURST_WORDS = ['SQUIRM!','BURROW!','TUNNEL!','WIGGLE!','COIL!','SLIME!','DODGE!','POW!','WORM!','BITE!'];

    function ClickBurst() {
      useEffect(() => {
        function handler(e) {
          if (e.target.closest('a, button, input, label')) return;
          const el = document.createElement('div');
          el.className = 'click-burst';
          el.textContent = BURST_WORDS[Math.floor(Math.random() * BURST_WORDS.length)];
          el.style.left = e.clientX + 'px';
          el.style.top  = e.clientY + 'px';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 900);
        }
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, []);
      return null;
    }

    /* ── Back to Top ─────────────────────────────────── */
    function BackToTop() {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const handler = () => setVisible(window.scrollY > 400);
        window.addEventListener('scroll', handler, { passive: true });
        return () => window.removeEventListener('scroll', handler);
      }, []);
      return (
        <button className={`back-to-top${visible ? ' visible' : ''}`} title="Back to top"
                onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>⬆</button>
      );
    }

    /* ── App ─────────────────────────────────────────── */
    function App() {
      useScrollReveal('.power-card, .enemy-card, .origin-panel, .comic-card, .stat-item');
      return (
        <>
          <ClickBurst />
          <AlertBar />
          <BackToTop />
          <Navbar />
          <Hero />
          <Origin />
          <Powers />
          <StatsBanner />
          <Enemies />
          <Comics />
          <Join />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
